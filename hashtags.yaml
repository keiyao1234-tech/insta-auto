# =============================================================
# 美容室向け キュレーション済みハッシュタグ（編集自由）
#
# pools : カテゴリ別のタグ群
# sets  : 実投稿で使う「名前付きの組み合わせ」。bandit はこの set を
#         arm（選択肢）として最適化する。
#
# 注意:
#  - ストーリーにはハッシュタグを付与できない（Meta公式制約）。
#    これらはフィード/Reel投稿でのみ使われる。
#  - 1投稿あたりのタグ上限は 30。set 解決時に自動で 30 件に丸める。
#  - "area"（地域タグ）は自店の地域に書き換えると新規発見に最も効く。
# =============================================================

pools:
  core:
    - "#美容室"
    - "#美容院"
    - "#ヘアサロン"
    - "#美容師"
    - "#hairsalon"
  style:
    - "#ヘアスタイル"
    - "#髪型"
    - "#イメチェン"
    - "#大人可愛い"
    - "#垢抜けヘア"
    - "#大人女子"
  trend:        # 流行スタイル（定期的に見直すと効果的。bandit が勝ちタグを学習）
    - "#韓国ヘア"
    - "#くびれヘア"
    - "#ウルフカット"
    - "#顔まわりレイヤー"
    - "#エアリーバング"
    - "#ニュアンスパーマ"
    - "#透明感ヘア"
  cut:
    - "#ボブ"
    - "#切りっぱなしボブ"
    - "#ショートヘア"
    - "#ハンサムショート"
    - "#ミディアムヘア"
    - "#レイヤーカット"
    - "#前髪カット"
  color:
    - "#ヘアカラー"
    - "#インナーカラー"
    - "#イヤリングカラー"
    - "#ミルクティーベージュ"
    - "#透明感カラー"
    - "#暗髪"
    - "#ブリーチなし"
    - "#ハイトーンカラー"
  care:
    - "#髪質改善"
    - "#髪質改善トリートメント"
    - "#艶髪"
    - "#ヘアケア"
    - "#縮毛矯正"
    - "#酸性ストレート"
  area:        # 東大阪・布施エリア（angelica布施店）
    - "#布施美容室"
    - "#布施美容院"
    - "#東大阪美容室"
    - "#布施駅"
    - "#近鉄布施"
    - "#東大阪"
  cta:
    - "#新規予約受付中"
    - "#ヘアサロン予約"

sets:
  - id: "balanced"
    pools: ["core", "style", "color", "area"]
  - id: "cut_focus"
    pools: ["core", "cut", "trend", "area"]
  - id: "color_focus"
    pools: ["core", "color", "care", "area"]
  - id: "care_focus"
    pools: ["core", "care", "style", "area"]
  - id: "korean_trend"
    pools: ["core", "trend", "color", "area"]
  - id: "hightone"
    pools: ["core", "color", "trend", "area"]
  - id: "local_cta"
    pools: ["core", "area", "cta", "trend"]
