# =============================================================
# 美容室向け キュレーション済みハッシュタグ（編集自由）
#
# pools : カテゴリ別のタグ群
# sets  : 実投稿で使う「名前付きの組み合わせ」。bandit はこの set を
#         arm（選択肢）として最適化する。
#
# 注意:
#  - ストーリーにはハッシュタグを付与できない（Meta公式制約）。
#    これらはフィード/Reel投稿でのみ使われる。
#  - 1投稿あたりのタグ上限は 30。set 解決時に自動で 30 件に丸める。
#  - "area"（地域タグ）は自店の地域に書き換えると新規発見に最も効く。
# =============================================================

pools:
  core:
    - "#美容室"
    - "#美容院"
    - "#ヘアサロン"
    - "#hairsalon"
    - "#美容師"
  style:
    - "#ヘアスタイル"
    - "#髪型"
    - "#イメチェン"
    - "#ヘアアレンジ"
    - "#大人女子"
  cut:
    - "#ボブ"
    - "#ショートヘア"
    - "#ショートボブ"
    - "#ミディアムヘア"
    - "#レイヤーカット"
  color:
    - "#ヘアカラー"
    - "#インナーカラー"
    - "#ハイライトカラー"
    - "#透明感カラー"
    - "#ブリーチカラー"
  care:
    - "#トリートメント"
    - "#髪質改善"
    - "#艶髪"
    - "#ヘアケア"
    - "#縮毛矯正"
  area:        # ←自店の地域に書き換えて使う
    - "#東京美容室"
    - "#渋谷美容室"
    - "#表参道美容室"
  cta:
    - "#新規予約受付中"
    - "#ヘアサロン予約"

sets:
  - id: "balanced"
    pools: ["core", "style", "color", "area"]
  - id: "cut_focus"
    pools: ["core", "cut", "style", "area"]
  - id: "color_focus"
    pools: ["core", "color", "care", "area"]
  - id: "care_focus"
    pools: ["core", "care", "style", "area"]
  - id: "local_cta"
    pools: ["core", "area", "cta", "style"]
