name: post-story

# 毎日 19:00 JST = 10:00 UTC にストーリーを投稿
on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch: {}        # 手動実行（動作確認用）

permissions:
  contents: write              # state/ のコミットに必要

concurrency:
  group: insta-state           # state を書く各ジョブを直列化
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Post story
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_APP_ID: ${{ secrets.IG_APP_ID }}
          IG_APP_SECRET: ${{ secrets.IG_APP_SECRET }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DRY_RUN: "0"
        run: python -m src.post_story

      - name: Commit state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          if git diff --cached --quiet; then
            echo "no state changes"
          else
            git commit -m "chore(state): post-story [skip ci]"
            git pull --rebase --autostash
            git push
          fi
