name: harvest

# 毎日 17:30 JST = 08:30 UTC に Insights を回収
# （前日のストーリー(19:00投稿)が消える24h前に確実に拾えるタイミング）
on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: insta-state
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Harvest insights
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_APP_ID: ${{ secrets.IG_APP_ID }}
          IG_APP_SECRET: ${{ secrets.IG_APP_SECRET }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DRY_RUN: "0"
        run: python -m src.harvest_metrics

      - name: Commit state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          if git diff --cached --quiet; then
            echo "no state changes"
          else
            git commit -m "chore(state): harvest [skip ci]"
            git pull --rebase --autostash
            git push
          fi
